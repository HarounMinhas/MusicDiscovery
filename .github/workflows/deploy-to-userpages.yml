name: Deploy MusicDiscovery web to user pages repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install deps
        run: pnpm install

      - name: Build web and workspace dependencies
        run: pnpm --filter @musicdiscovery/web... build

      - name: Ensure GH_PAGES_TOKEN exists
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          if [ -z "$GH_PAGES_TOKEN" ]; then
            echo "GH_PAGES_TOKEN is missing. Add a PAT with repo write access to secrets." >&2
            exit 1
          fi

      - name: Checkout user pages repo
        uses: actions/checkout@v4
        with:
          repository: HarounMinhas/harounminhas.github.io
          token: ${{ secrets.GH_PAGES_TOKEN }}
          path: userpages

      - name: Replace deployed folder
        run: |
          rm -rf userpages/MusicDiscovery
          mkdir -p userpages/MusicDiscovery
          cp -R apps/web/dist/* userpages/MusicDiscovery/
          touch userpages/MusicDiscovery/.nojekyll

      - name: Commit and push
        env:
          GH_PAGES_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
        run: |
          cd userpages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy MusicDiscovery from MusicDiscovery repo"
            git remote set-url origin "https://x-access-token:${GH_PAGES_TOKEN}@github.com/HarounMinhas/harounminhas.github.io.git"
            git push origin main
          fi
